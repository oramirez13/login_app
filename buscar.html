  <body>
    <!-- navbar principal -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">ORAMI</a>
        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#menuPrincipal"
          aria-controls="menuPrincipal"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuPrincipal">
          <div class="navbar-nav mr-auto">
            <a class="nav-item nav-link" href="index.html">Inicio</a>
            <a class="nav-item nav-link" href="blog.html">Blog</a>
            <a class="nav-item nav-link" href="acerca.html">Acerca de</a>

        </div>

    <!-- contenedor principal -->
    <div class="container mt-5">
      <h1 class="text-center">Buscar usuario</h1>
      <p class="text-center">
        Introduce un nombre de usuario para buscarlo en el sistema
      </p>

      <!-- formulario solo visual -->
      <div class="mx-auto mt-4" style="max-width: 500px">
        <div class="input-group">
          <input
            type="text"
            id="buscarInput"
            class="form-control"
            placeholder="Nombre de usuario..."
          />
          <div class="input-group-append">
            <button class="btn btn-primary" id="btnBuscar">Buscar</button>
          </div>
        </div>
      </div>

      <!-- aviso demo -->
      <div class="alert alert-warning mt-4">
        <strong>Demo visual:</strong> La búsqueda no está conectada a una base
