<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>login_app</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
      crossorigin="anonymous"
    />
    <link rel="stylesheet" href="static/css/style.css" />
  </head>
  <body>
    <!-- navbar principal -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <a class="navbar-brand" href="index.html">ORAMI</a>
        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#menuPrincipal"
          aria-controls="menuPrincipal"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="menuPrincipal">
          <div class="navbar-nav mr-auto">
            <a class="nav-item nav-link" href="index.html">Inicio</a>
            <a class="nav-item nav-link" href="blog.html">Blog</a>
            <a class="nav-item nav-link" href="acerca.html">Acerca de</a>
            <a class="nav-item nav-link active" href="contacto.html"
              >Contacto</a
            >
            <a class="nav-item nav-link" href="buscar.html">Buscar</a>
          </div>
          <img
            src="static/img/infosec_orami_.png"
            alt="Logo"
            style="height: 40px"
            class="d-none d-lg-block mr-3"
          />
          <a href="index.html" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
      </div>
    </nav>

    <!-- contenedor principal -->
    <div class="container mt-5 text-center">
      <h1>Contacto</h1>
      <p>Canales de comunicación</p>
      <h2>Escríbenos</h2>

      <!-- formulario solo visual -->
      <form id="formContacto">
        <div class="form-group">
          <label>Nombre:</label>
          <input type="text" id="nombre" class="form-control" required />
        </div>

        <div class="form-group">
          <label>Mensaje:</label>
          <textarea id="mensaje" class="form-control" rows="3"></textarea>
          <p>Total caracteres: <span id="contador">0</span></p>
        </div>
        <button type="submit" class="btn btn-primary">Enviar</button>
      </form>

      <!-- aviso demo -->
      <div class="alert alert-warning mt-4">
        <strong>Demo visual:</strong> El formulario no está conectado a un
        servidor en esta versión estática.
      </div>
    </div>

    <script
      src="https://code.jquery.com/jquery-3.7.1.js"
      integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"
      integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"
      integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
      crossorigin="anonymous"
    ></script>
    <script src="static/js/script.js"></script>
  </body>
</html>
