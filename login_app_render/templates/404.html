<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Error 404</title>

    <!-- Bootstrap/css -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
      crossorigin="anonymous"
    />

    <!-- css/style.css -->
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>

  <body class="text-white text-center">
    <!-- imágenes fundidas a pantalla completa (fondo) -->
    <div class="img-fusion">
      <!-- imagen base: 404_1.jpg (NO SIGNAL) -->
      <img src="/static/img/404_1.jpg" alt="NO SIGNAL" class="img-base" />

      <!-- imagen superpuesta: 404_2.jpg (NO NO NO) fusionada con screen -->
      <img src="/static/img/404_2.jpg" alt="NO NO NO" class="img-overlay" />
    </div>

    <!-- contenido encima de las imágenes -->
    <div class="container mt-5 contenido-404">
      <!-- título de error -->
      <h1 class="display-3">404</h1>
      <h3>Página no encontrada</h3>
      <p class="mt-3">Parece que te perdiste en el sistema...</p>

      <!-- botón volver al inicio -->
      <a href="/" class="btn btn-primary mt-3">Volver al inicio</a>
    </div>
  </body>
</html>
