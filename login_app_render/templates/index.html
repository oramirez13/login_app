<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- responsive -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>login_app</title>

    <!-- Bootstrap/css -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-ggOyR0iXCbMQv3Xipma34MD+dH/1fQ784/j6cY/iJTQUOhcWr7x9JvoRxT2MZw1T"
      crossorigin="anonymous"
    />

    <!-- css/style.css -->
    <link rel="stylesheet" href="/static/css/style.css" />
  </head>
  <body>
    <!-- navbar principal -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
      <div class="container">
        <!-- marca/logo texto -->
        <a class="navbar-brand" href="/">ORAMI</a>

        <!-- botón hamburguesa para móviles -->
        <button
          class="navbar-toggler"
          type="button"
          data-toggle="collapse"
          data-target="#menuPrincipal"
          aria-controls="menuPrincipal"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>

        <!-- links de navegación -->
        <div class="collapse navbar-collapse" id="menuPrincipal">
          <div class="navbar-nav mr-auto">
            <a class="nav-item nav-link active" href="/">Inicio</a>
            <a class="nav-item nav-link" href="/blog">Blog</a>
            <a class="nav-item nav-link" href="/acerca">Acerca de</a>
            <a class="nav-item nav-link" href="/contacto">Contacto</a>
            <a class="nav-item nav-link" href="/buscar">Buscar</a>
          </div>

          <!-- logo imagen -->
          <img
            src="/static/img/infosec_orami_.png"
            alt="Logo"
            style="height: 40px"
            class="d-none d-lg-block mr-3"
          />

          <!-- botón logout -->
          <a href="/logout" class="btn btn-outline-danger btn-sm">Logout</a>
        </div>
      </div>
    </nav>

    <!-- contenedor principal -->
    <div class="container mt-5 text-center">
      <!-- título -->
      <h1>login app</h1>
      <p>Práctica de ciberseguridad</p>

      <!-- RABBIT HOLE: no es una flag real -->
      <p style="display: none">FLAG{not_the_flag_you_are_looking_for}</p>

      <!-- tarjeta del login -->
      <div class="card mx-auto p-4" style="max-width: 400px">
        <!-- FORM agregado -->
        <form id="loginForm">
          <!-- input usuario -->
          <input
            type="text"
            id="username"
            class="form-control mb-2"
            placeholder="Usuario"
            required
          />

          <!-- input password -->
          <input
            type="password"
            id="password"
            class="form-control mb-2"
            placeholder="Password"
            required
          />

          <!-- botón login -->
          <button type="submit" id="loginBtn" class="btn btn-primary btn-block">
            Ingresar
          </button>
        </form>

        <!-- mensaje de respuesta -->
        <p id="msg" class="mt-3"></p>
      </div>
    </div>

    <!--jQuery-->
    <script
      src="https://code.jquery.com/jquery-3.7.1.js"
      integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4="
      crossorigin="anonymous"
    ></script>

    <!--Bottstrap/popper-->
    <script
      src="https://cdn.jsdelivr.net/npm/popper.js@1.14.7/dist/umd/popper.min.js"
      integrity="sha384-UO2eT0CpHqdSJQ6hJty5KVphtPhzWj9WO1clHTMGa3JDZwrnQq4sF86dIHNDz0W1"
      crossorigin="anonymous"
    ></script>

    <!--Bottstrap/js-->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@4.3.1/dist/js/bootstrap.min.js"
      integrity="sha384-JjSmVgyd0p3pXB1rRibZUAYoIIy6OrQ6VrjIEaFf/nJGzIxFDsf4x0xIM+B07jRM"
      crossorigin="anonymous"
    ></script>

    <!-- js/script.js -->
    <script src="/static/js/script.js"></script>
  </body>
</html>
